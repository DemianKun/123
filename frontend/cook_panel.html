<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Operaciones | KitchenCore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="padding-top: 2rem;">
    <div class="mesh-bg"></div>

    <nav class="navbar glass-panel">
        <div class="logo">
            <i class="fas fa-knife-kitchen" style="color: var(--primary-red);"></i> LINEA<span>OPERATIVA</span>
        </div>
        <div class="nav-links">
            <span style="font-weight: 600; color: var(--text-muted);">ID: <span id="cookId">--</span></span>
            <button onclick="app.logout()" class="btn btn-outline" style="padding: 0.5rem 1rem;">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </nav>

    <div style="max-width: 900px; margin: 0 auto; padding: 0 2rem;">
        <div id="requestTaskSection" class="glass-panel dashboard-card" style="text-align: center; padding: 4rem 2rem;">
            <i class="fas fa-clipboard-list" style="font-size: 4rem; color: var(--primary-red); opacity: 0.2; margin-bottom: 2rem;"></i>
            <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Asignación de Tareas</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 3rem; max-width: 500px; margin-left: auto; margin-right: auto;">
                El sistema inteligente evaluará el inventario actual y te asignará la receta prioritaria para producción.
            </p>
            <button id="btnRequestTask" class="btn btn-action" style="margin: 0 auto;">
                SOLICITAR PRÓXIMA RECETA <i class="fas fa-bolt"></i>
            </button>
        </div>

        <div id="recipePanel" class="glass-panel dashboard-card hidden" style="animation: fadeIn 0.5s ease;">
            <div class="card-header">
                <h2 id="recipeName" style="font-size: 2rem; color: var(--text-main);">Nombre de la Receta</h2>
                <div class="status-pill status-warning">En Preparación</div>
            </div>
            
            <div style="margin-bottom: 3rem;">
                <h3 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 1.5rem;">
                    <i class="fas fa-mortar-pestle"></i> Insumos Requeridos (IoT Verificados)
                </h3>
                <ul id="recipeIngredientsList" style="list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <!-- Dinámico -->
                </ul>
            </div>

            <div style="border-top: 1px solid var(--card-border); padding-top: 2rem; display: flex; justify-content: flex-end;">
                <button id="btnFinishTask" class="btn btn-primary" style="padding: 1rem 3rem; font-size: 1.1rem;">
                    NOTIFICAR FINALIZACIÓN <i class="fas fa-check-circle"></i>
                </button>
            </div>
        </div>
        
        <div id="notificationArea" class="notification-area hidden" style="margin-top: 2rem; border-radius: var(--radius-md);"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            app.initCookPanel();
        });
    </script>
</body>
</html>
