<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Inteligente de Cocina IoT | Control Total</title>
    <!-- Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="mesh-bg"></div>
    
    <nav class="navbar glass-panel">
        <div class="logo">
            <i class="fas fa-microchip"></i> KITCHEN<span>CORE</span>
        </div>
        <div class="nav-links">
            <a href="#features">Tecnología</a>
            <a href="#about">Seguridad</a>
            <a href="#" class="btn btn-primary" onclick="app.toggleAuthForm('login')">Acceso Sistema</a>
        </div>
    </nav>

    <main class="login-portal">
        <div class="portal-container">
            <div class="portal-header">
                <i class="fas fa-server"></i>
                <h1>TERMINAL DE ACCESO <span>KITCHENCORE</span></h1>
                <p>Uso exclusivo para personal autorizado | Estación Local v2.4</p>
            </div>

            <div id="loginForm" class="glass-panel auth-card" style="margin: 0 auto;">
                <div class="form-group">
                    <label><i class="fas fa-id-badge"></i> Identificación de Usuario</label>
                    <input type="text" id="loginUsername" placeholder="ID del personal" class="form-input">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Clave de Seguridad</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" class="form-input">
                </div>
                <button onclick="app.login()" class="btn btn-primary" style="width: 100%;">
                    AUTENTICAR Y ENTRAR <i class="fas fa-sign-in-alt"></i>
                </button>
                <div style="display: flex; justify-content: space-between; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">
                    <span><i class="fas fa-shield-alt"></i> Encriptación Local</span>
                    <a href="#" onclick="app.toggleAuthForm('register')" style="color: var(--primary-red); text-decoration: none; font-weight: 600;">Registrar Nuevo Operador</a>
                </div>
            </div>

            <div id="registerForm" class="glass-panel auth-card hidden" style="margin: 0 auto;">
                <div class="card-header" style="margin-bottom: 1.5rem; text-align: center;">
                    <h2 style="color: var(--text-main);">Alta de Personal</h2>
                </div>
                <div class="form-group">
                    <label>ID de Usuario</label>
                    <input type="text" id="regUsername" placeholder="Ej: chef_juan" class="form-input">
                </div>
                <div class="form-group">
                    <label>Asignar Clave</label>
                    <input type="password" id="regPassword" placeholder="••••••••" class="form-input">
                </div>
                <div class="form-group">
                    <label>Nivel de Acceso</label>
                    <select id="regRole" class="form-input">
                        <option value="cocinero">Personal de Cocina (Operador)</option>
                        <option value="chef">Chef de Estación (Supervisor)</option>
                    </select>
                </div>
                <button onclick="app.register()" class="btn btn-primary" style="width: 100%;">
                    CREAR PERFIL LOCAL <i class="fas fa-user-plus"></i>
                </button>
                <p style="margin-top: 1.5rem; font-size: 0.85rem; text-align: center; color: var(--text-muted);">
                    <a href="#" onclick="app.toggleAuthForm('login')" style="color: var(--primary-red); font-weight: 600;">Regresar al Login</a>
                </p>
            </div>
            
            <div id="authNotification" class="notification-area hidden" style="margin-top: 1rem; max-width: 450px; margin-left: auto; margin-right: auto;"></div>
            
            <div class="portal-footer">
                <span><i class="fas fa-wifi"></i> Conectado al Backend Local</span>
                <span><i class="fas fa-clock"></i> <span id="portalTime">--:--:--</span></span>
            </div>
        </div>
    </main>

    <script>
        // Actualizar reloj del portal
        setInterval(() => {
            const now = new Date();
            document.getElementById('portalTime').textContent = now.toLocaleTimeString();
        }, 1000);
    </script>

    <script src="js/app.js"></script>
</body>
</html>
